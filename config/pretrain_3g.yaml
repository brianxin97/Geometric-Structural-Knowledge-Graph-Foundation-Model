output_dir: ~/gamma/output

dataset:
  class: JointDataset
  graphs: [FB15k237, WN18RR, CoDExMedium]
  root: ~/gamma/datasets

model:
  class: Gamma
  relation_model:
    hidden_dim: 32
    num_heads: 4
  entity_model:
    input_dim: 32
    hidden_dims: [32, 32, 32, 32, 32, 32]
    model_list: [ 'rotate', 'split', 'dual' ]
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
    attn_dropout: 0.1
    entropy_reg_weight: 0.003

task:
  name: MultiGraphPretraining
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 16
  num_epoch: 10
  log_interval: 800
  batch_per_epoch: 80000
  fast_test: 500
  gradient_accumulation_steps: 1
  #logger: wandb