output_dir: ~/gamma/output

dataset:
  class: {{ dataset }}
  root: ~/gamma/datasets

model:
  class: Gamma
  relation_model:
    hidden_dim: 32
    num_heads: 4
  entity_model:
    input_dim: 32
    hidden_dims: [32, 32, 32, 32, 32, 32]
    model_list: [ 'rotate', 'split', 'dual' ]
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
    attn_dropout: 0.1
    entropy_reg_weight: 0.003

task:
  name: TransductiveInference
  num_negative: 256
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10, mrr-tail, hits@10-tail]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 8
  num_epoch: {{ epochs }}
  log_interval: 100
  batch_per_epoch: {{ bpe }}

checkpoint: {{ ckpt }}