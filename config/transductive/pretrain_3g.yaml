output_dir: ~/Geometric-Knowledge-Graph-Foundation-Model
/output

dataset:
  class: JointDataset
  graphs: [FB15k237, WN18RR, CoDExMedium]
  root: ~/Geometric-Knowledge-Graph-Foundation-Model
/datasets

model:
  class: Gamma
  relation_model:
    class: RelNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64, 64, 64]
    message_func: distmult
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes
  entity_model:
    class: EntityNBFNet
    input_dim: 64
    hidden_dims: [64, 64, 64, 64, 64, 64]
    model_list: [ 'complex', 'split' ]
    aggregate_func: sum
    short_cut: yes
    layer_norm: yes

task:
  name: MultiGraphPretraining
  num_negative: 512
  strict_negative: yes
  adversarial_temperature: 1
  metric: [mr, mrr, hits@1, hits@3, hits@10]

optimizer:
  class: AdamW
  lr: 5.0e-4

train:
  gpus: {{ gpus }}
  batch_size: 8  # 8 for 4x A100 (40 GB), adjust gradient_accumulation_steps accordingly
  num_epoch: 10
  log_interval: 800
  batch_per_epoch: 80000
  fast_test: 500
  gradient_accumulation_steps: 2
  #logger: wandb
